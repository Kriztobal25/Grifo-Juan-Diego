<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Despacho a Crédito - Grifo Juan Diego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .sidebar { width: 260px; background-color: #1e293b; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; }
        .main-content { flex: 1; margin-left: 260px; padding: 30px; width: calc(100% - 260px); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .vale-input { background-color: #fff9db !important; border: 2px solid #fab005 !important; color: #856404 !important; font-weight: bold; font-size: 1.3rem !important; text-align: center; }
        .total-box { background-color: #eff6ff; border: 2px solid #bfdbfe; border-radius: 12px; padding: 20px; text-align: center; }
        .total-box h2 { color: #1e40af; font-size: 2.5rem; margin: 0; font-weight: bold; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .operador-badge { background-color: #1e293b; color: #f8fafc; padding: 8px 18px; border-radius: 50px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav th:replace="~{layout/navbar :: menu_lateral}"></nav>

    <main class="main-content">
        <div class="container-fluid">
            
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fa-solid fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-0">Despacho a Crédito</h2>
                    <p class="text-muted">Complete los datos del vale para registrar la deuda.</p>
                </div>
                <div class="text-end">
                    <span class="operador-badge shadow-sm">
                        <i class="fa-solid fa-user-check me-2 text-info"></i>
                        Operador: <span th:text="${operadorNombre}">Admin</span>
                    </span>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-10 col-xl-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <form th:action="@{/creditos/guardar}" th:object="${credito}" method="POST">
                                
                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label">1. Empresa Cliente</label>
                                        <select id="selectEmpresa" class="form-select form-select-lg" onchange="filtrarPlacas()" required>
                                            <option value="" selected disabled>Elija empresa...</option>
                                            <th:block th:each="emp : ${empresas}">
                                                <option th:value="${emp.ruc}" th:text="${emp.razonSocial}"></option>
                                            </th:block>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">2. Placa de Unidad</label>
                                        <select th:field="*{vehiculo.placa}" id="selectPlaca" class="form-select form-select-lg" required>
                                            <option value="" selected disabled>Seleccione placa...</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Número de Vale Físico</label>
                                    <input type="text" name="nroVale" class="form-control vale-input" placeholder="VALE-00000" required>
                                </div>

                                <hr class="my-4">

                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label">Tipo de Combustible</label>
                                        <select th:field="*{combustible.id}" id="selectCombustible" class="form-select" onchange="actualizarCalculo()" required>
                                            <option value="" selected disabled>Seleccione producto...</option>
                                            <option th:each="c : ${combustibles}" 
                                                    th:value="${c.id}" 
                                                    th:data-precio="${c.precioVenta}" 
                                                    th:text="${c.nombre}"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Cantidad a Despachar (Galones)</label>
                                        <input type="number" step="0.001" th:field="*{cantidadGalones}" id="cantidad" class="form-control" oninput="actualizarCalculo()" placeholder="0.000" required>
                                    </div>
                                </div>

                                <div class="row align-items-center">
                                    <div class="col-md-6">
                                        <label class="form-label">Vencimiento Sugerido</label>
                                        <input type="date" th:field="*{fechaVencimiento}" class="form-control" required>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="total-box shadow-sm">
                                            <p class="mb-0 text-muted fw-bold small">TOTAL ESTIMADO</p>
                                            <small id="detallePrecio" class="text-primary fw-bold">Precio Unit: S/ 0.00</small>
                                            <h2 id="totalDisplay">S/ 0.00</h2>
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-4 pt-2 text-end">
                                    <button type="submit" class="btn btn-primary btn-lg px-5 shadow">
                                        <i class="fa-solid fa-gas-pump me-2"></i> Confirmar Despacho
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function actualizarCalculo() {
            const select = document.getElementById('selectCombustible');
            const option = select.options[select.selectedIndex];
            const precio = parseFloat(option.getAttribute('data-precio')) || 0;
            const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
            document.getElementById('detallePrecio').innerText = 'Precio Unit: S/ ' + precio.toFixed(2);
            document.getElementById('totalDisplay').innerText = 'S/ ' + (precio * cantidad).toFixed(2);
        }

        async function filtrarPlacas() {
            const ruc = document.getElementById('selectEmpresa').value;
            const selectPlaca = document.getElementById('selectPlaca');
            selectPlaca.innerHTML = '<option value="">Cargando unidades...</option>';
            try {
                // LLAMADA AL API DE VEHICULOS
                const response = await fetch('/api/vehiculos/empresa/' + ruc);
                const data = await response.json();
                selectPlaca.innerHTML = '<option value="" disabled selected>Seleccione placa...</option>';
                data.forEach(v => {
                    let opt = document.createElement('option');
                    opt.value = v.placa; // Este es el valor que recibirá th:field
                    opt.text = v.placa + (v.marcaModelo ? ' (' + v.marcaModelo + ')' : '');
                    selectPlaca.appendChild(opt);
                });
            } catch (e) {
                console.error(e);
                selectPlaca.innerHTML = '<option value="">Error al cargar unidades</option>';
            }
        }
    </script>
</body>
</html>
