<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Personal - Grifo Juan Diego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-color: #1e293b; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
        
        /* Estilos obligatorios para que el sidebar funcione como en tu captura */
        .sidebar { 
            width: 260px; 
            background-color: var(--sidebar-color); 
            color: white; 
            min-height: 100vh;
            position: fixed;
        }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-section { font-size: 0.75rem; font-weight: bold; color: #64748b; margin-top: 20px; padding-left: 20px; text-transform: uppercase; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* Contenedor principal desplazado a la derecha del sidebar */
        .main-content { 
            flex: 1; 
            margin-left: 260px; /* Ancho exacto del sidebar */
            padding: 40px; 
        }
        
        .table-card { border: none; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

    <nav th:replace="~{layout/navbar :: menu_lateral}"></nav>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark"><i class="fa-solid fa-id-card me-2 text-primary"></i> Gestión de Personal</h2>
            <button class="btn btn-primary btn-lg shadow-sm" onclick="abrirModalNuevo()">
                <i class="fa-solid fa-plus me-2"></i> Registrar Empleado
            </button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card table-card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">DNI</th>
                            <th>Nombre Completo</th>
                            <th>Teléfono</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${empleados}">
                            <td class="ps-4 fw-bold" th:text="${emp.dniEmpleado}"></td>
                            <td th:text="${emp.nombre}"></td>
                            <td th:text="${emp.telefono}"></td>
                            <td class="text-center">
                                <button class="btn btn-outline-warning btn-sm border-0" 
                                        th:data-dni="${emp.dniEmpleado}"
                                        onclick="abrirModalEditar(this.getAttribute('data-dni'))">
                                    <i class="fa-solid fa-pen-to-square fs-5"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(empleados)}">
                            <td colspan="4" class="text-center py-4 text-muted">No hay empleados registrados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEmpleado" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <form th:action="@{/empleados/guardar}" method="POST" id="formEmpleado">
                    <div class="modal-header bg-dark text-white">
                        <h5 class="modal-title" id="tituloModal">Formulario de Empleado</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Número de DNI</label>
                            <input type="text" name="dniEmpleado" id="dniInput" class="form-control" required maxlength="15">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" name="nombre" id="nombreInput" class="form-control" required maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Teléfono de Contacto</label>
                            <input type="text" name="telefono" id="telefonoInput" class="form-control" maxlength="20">
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary px-4">Guardar Empleado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const myModal = new bootstrap.Modal(document.getElementById('modalEmpleado'));

        function abrirModalNuevo() {
            document.getElementById('formEmpleado').reset();
            document.getElementById('dniInput').readOnly = false;
            document.getElementById('tituloModal').innerText = "Registrar Nuevo Empleado";
            myModal.show();
        }

        function abrirModalEditar(dni) {
            fetch('/empleados/buscar/' + dni)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('dniInput').value = data.dniEmpleado;
                    document.getElementById('dniInput').readOnly = true;
                    document.getElementById('nombreInput').value = data.nombre;
                    document.getElementById('telefonoInput').value = data.telefono;
                    document.getElementById('tituloModal').innerText = "Editar Información de Empleado";
                    myModal.show();
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
