# Servidor
server.port=8080

# Conexión MySQL Local
spring.datasource.url=jdbc:mysql://localhost:3306/GrifoSistemaCredito?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=

# Hibernate - Esto crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Permitir que el HTML use archivos locales (Vouchers)
spring.servlet.multipart.max-file-size=10MB