<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grifo Juan Diego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: none;
            border: 1px solid #fbbf24;
        }
        .btn-login {
            background-color: #fbbf24;
            color: #1e293b;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #f59e0b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-4 text-warning">
            <i class="fa-solid fa-gas-pump fa-4x"></i>
            <h3 class="mt-3 text-white">Grifo Juan Diego</h3>
            <p class="text-muted">Gestión de Créditos</p>
        </div>

        <form th:action="@{/login}" method="post"> 
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-warning"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control" required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-warning"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100 py-2 mb-3">INGRESAR</button>
        </form>
    </div>

</body>
</html>
