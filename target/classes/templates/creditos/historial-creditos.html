<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial - Grifo Juan Diego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f1f5f9; }
        .sidebar { width: 260px; background-color: #1e293b; color: white; min-height: 100vh; }
        .main-content { flex: 1; padding: 30px; }
        /* Estilos consistentes con el navbar */
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-section { font-size: 0.75rem; font-weight: bold; color: #64748b; margin-top: 20px; padding: 0 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav th:replace="~{layout/navbar :: menu_lateral}"></nav>

    <main class="main-content">
        <div class="container-fluid">
            <h3 class="mb-4 fw-bold">Historial de Despachos a Crédito</h3>
            
            <div class="card mb-4 border-0 shadow-sm">
                <div class="card-body">
                    <form th:action="@{/creditos/historial}" method="GET" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Buscar por Placa</label>
                            <input type="text" name="placa" class="form-control text-uppercase" 
                                   placeholder="ABC-123" th:value="${param.placa}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Filtrar por Fecha</label>
                            <input type="date" name="fecha" class="form-control" th:value="${param.fecha}">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-secondary w-100">
                                <i class="fa-solid fa-filter me-2"></i> Filtrar
                            </button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <a th:href="@{/creditos/historial}" class="btn btn-outline-light text-dark w-100 border">
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="table-responsive shadow-sm rounded">
                <table class="table table-striped table-hover bg-white border mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha/Hora</th>
                            <th>Placa</th>
                            <th>Combustible</th>
                            <th>Galones</th>
                            <th>Total Deuda</th>
                            <th>Vencimiento</th>
                            <th>Despachador</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="credito : ${listaCreditos}">
                            <td th:text="${#temporals.format(credito.fechaDespacho, 'dd/MM/yyyy HH:mm')}">20/03/2026 14:30</td>
                            <td><strong th:text="${credito.vehiculo.placa}">B8F-900</strong></td>
                            <td th:text="${credito.catalogoCombustible.nombre}">Diesel</td>
                            <td th:text="${#numbers.formatDecimal(credito.cantidadGalones, 1, 3)}">25.500</td>
                            <td class="fw-bold text-dark" th:text="'S/ ' + ${#numbers.formatDecimal(credito.totalDeuda, 1, 2)}">S/ 402.90</td>
                            <td>
                                <span class="text-danger fw-bold" th:text="${#temporals.format(credito.fechaVencimiento, 'dd/MM/yyyy')}">30/03/2026</span>
                            </td>
                            <td th:text="${credito.usuario.username}">J. Perez</td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(listaCreditos)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="fa-solid fa-folder-open fs-2 d-block mb-2"></i>
                                No se encontraron registros de despachos.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="mt-4 text-end">
                <button class="btn btn-dark" onclick="window.print()">
                    <i class="fa-solid fa-print me-2"></i> Imprimir Reporte
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
