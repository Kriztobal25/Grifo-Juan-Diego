<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Grifo Juan Diego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estructura Base unificada */
        body { 
            display: flex; 
            min-height: 100vh; 
            background-color: #f1f5f9; 
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Sidebar Fijo */
        .sidebar { 
            width: 260px; 
            background-color: #1e293b; 
            min-height: 100vh; 
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
        }

        /* Contenido desplazado a la derecha */
        .main-content { 
            flex: 1; 
            margin-left: 260px; 
            padding: 30px; 
            width: calc(100% - 260px);
        }

        .card { border-radius: 12px; }
        .nav-section { font-size: 0.75rem; font-weight: bold; color: #64748b; padding: 20px 20px 5px; text-transform: uppercase; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav th:replace="~{layout/navbar :: menu_lateral}"></nav>

    <main class="main-content">
        <div class="container-fluid">
            
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                <i class="fa-solid fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                    <h3 class="card-title mb-0 h5 fw-bold"><i class="fa-solid fa-users-cog me-2 text-info"></i> Control de Accesos al Sistema</h3>
                    <a th:href="@{/}" class="btn btn-sm btn-outline-light px-3">
                        <i class="fa-solid fa-arrow-left me-2"></i>Regresar al Panel
                    </a>
                </div>
                
                <div class="card-body p-4">
                    <div class="row g-4">
                        <div class="col-xl-4 col-lg-5">
                            <form th:action="@{/usuarios/guardar}" method="POST" class="p-4 border rounded-3 bg-light shadow-sm">
                                <h5 class="mb-4 border-bottom pb-2 fw-bold text-dark">Crear Credenciales</h5>
                                
                                <div class="mb-3">
                                    <label class="form-label">DNI del Empleado</label>
                                    <select class="form-select border-primary-subtle" name="empleado.dniEmpleado" required>
                                        <option value="" disabled selected>Seleccione empleado...</option>
                                        <option th:each="emp : ${empleados}" 
                                                th:value="${emp.dniEmpleado}" 
                                                th:text="${emp.dniEmpleado + ' - ' + emp.nombre}"></option>
                                    </select>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Nombre de Usuario</label>
                                    <input type="text" class="form-control" name="username" required placeholder="ej. jdiego_grifo">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" name="passwordPlana" required>
                                    <div class="form-text text-muted" style="font-size: 0.7rem;">La clave será encriptada por seguridad.</div>
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label">Rol en el Sistema</label>
                                    <select class="form-select" name="rol.idRol" required>
                                        <option value="" disabled selected>Asigne un rol...</option>
                                        <option th:each="r : ${roles}" 
                                                th:value="${r.idRol}" 
                                                th:text="${r.nombreRol}"></option>
                                    </select>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 shadow-sm fw-bold">
                                    <i class="fa-solid fa-user-shield me-2"></i>Vincular Acceso
                                </button>
                            </form>
                        </div>

                        <div class="col-xl-8 col-lg-7">
                            <div class="table-responsive rounded-3 border">
                                <table class="table table-hover align-middle mb-0 bg-white">
                                    <thead class="table-dark">
                                        <tr>
                                            <th class="ps-3">Usuario</th>
                                            <th>Empleado Vinculado</th>
                                            <th>Rol</th>
                                            <th class="text-center pe-3">Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="user : ${usuarios}">
                                            <td class="ps-3 fw-bold text-primary" th:text="${user.username}"></td>
                                            <td th:text="${user.empleado != null ? user.empleado.nombre : '⚠️ Sin nombre'}"></td>
                                            <td>
                                                <span class="badge bg-info text-dark px-3 py-2 fw-bold" 
                                                      th:text="${user.rol != null ? user.rol.nombreRol : 'PENDIENTE'}"></span>
                                            </td>
                                            <td class="text-center pe-3">
                                                <form th:action="@{/usuarios/eliminar/{id}(id=${user.idUsuario})}" method="POST" 
                                                      onsubmit="return confirm('¿Está seguro de eliminar este acceso?')">
                                                    <button type="submit" class="btn btn-outline-danger btn-sm border-0" title="Eliminar Acceso">
                                                        <i class="fa-solid fa-trash-can fs-5"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(usuarios)}">
                                            <td colspan="4" class="text-center text-muted py-5">
                                                <i class="fa-solid fa-shield-halved fs-2 d-block mb-2 opacity-25"></i>
                                                No hay accesos configurados.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
