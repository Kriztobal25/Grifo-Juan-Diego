<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Grifo Juan Diego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estructura Base unificada */
        body { 
            display: flex; 
            min-height: 100vh; 
            background-color: #f1f5f9; 
            margin: 0;
        }

        /* Sidebar Fijo */
        .sidebar { 
            width: 260px; 
            background-color: #1e293b; 
            color: white; 
            min-height: 100vh; 
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
        }

        /* Contenido desplazado a la derecha */
        .main-content { 
            flex: 1; 
            margin-left: 260px; 
            padding: 30px; 
            width: calc(100% - 260px);
        }

        .card { border-radius: 12px; }
        .table-responsive { border-radius: 12px; }
    </style>
</head>
<body>

    <nav th:replace="~{layout/navbar :: menu_lateral}"></nav>

    <main class="main-content">
        <div class="container-fluid">
            
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0"><i class="fa-solid fa-users me-2"></i>Registro de Choferes (Clientes)</h5>
                    <span class="badge bg-primary px-3">Operaciones de Crédito</span>
                </div>
                
                <div class="card-body p-4">
                    <form th:action="@{/clientes/guardar}" method="POST" class="row g-3 mb-4 p-3 bg-light rounded-3 border">
                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-uppercase">DNI</label>
                            <input type="text" class="form-control" name="dniCliente" maxlength="8" placeholder="8 dígitos" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-uppercase">Nombre del Chofer</label>
                            <input type="text" class="form-control" name="nombreChofer" placeholder="Nombres y Apellidos" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-uppercase">Asignar Empresa</label>
                            <select class="form-select" name="empresa.ruc" required>
                                <option value="" selected disabled>Seleccione una empresa...</option>
                                <option th:each="emp : ${empresasActivas}" 
                                        th:value="${emp.ruc}" 
                                        th:text="${emp.razonSocial}"></option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-success w-100 shadow-sm fw-bold">
                                <i class="fa-solid fa-user-plus me-2"></i>Registrar
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive shadow-sm">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-secondary">
                                <tr>
                                    <th class="ps-3">DNI</th>
                                    <th>Nombre Completo</th>
                                    <th>Empresa Vinculada</th>
                                    <th>Estado Empresa</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cliente : ${clientes}">
                                    <td th:text="${cliente.dniCliente}" class="fw-bold ps-3"></td>
                                    <td th:text="${cliente.nombreChofer}"></td>
                                    <td th:text="${cliente.empresa.razonSocial}"></td>
                                    <td>
                                        <span th:if="${cliente.empresa.estadoEmpresa.name() == 'Activo'}" class="badge bg-success">Activa</span>
                                        <span th:if="${cliente.empresa.estadoEmpresa.name() == 'Suspendido'}" class="badge bg-danger">Suspendida</span>
                                    </td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-outline-primary" title="Ver Historial">
                                            <i class="fa-solid fa-clock-rotate-left"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-warning" title="Editar">
                                            <i class="fa-solid fa-pen"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(clientes)}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="fa-solid fa-user-slash d-block fs-2 mb-2"></i>
                                        No hay choferes registrados aún.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
