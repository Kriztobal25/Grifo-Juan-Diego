<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

    <nav th:fragment="menu_lateral" class="sidebar shadow">
        <div class="sidebar-header">
            <h4 class="mb-0">
                <i class="fas fa-gas-pump me-2"></i>Juan Diego
            </h4>
        </div>
        
        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    <i class="fas fa-home me-2"></i>Dashboard
                </a>
            </li>
            
            <li class="nav-section">OPERACIONES</li>
            
            <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                <a class="nav-link" th:href="@{/combustibles}">
                    <i class="fas fa-tint me-2"></i>Precios Combustible
                </a>
            </li>
            
            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'DESPACHADOR')">
                <a class="nav-link" th:href="@{/creditos/despacho}">
                    <i class="fas fa-file-invoice-dollar me-2"></i>Nuevo Despacho
                </a>
            </li>

            <li class="nav-section">ADMINISTRACIÓN</li>
            
            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'DESPACHADOR')">
                <a class="nav-link" th:href="@{/empresas}">
                    <i class="fas fa-building me-2"></i>Empresas Clientes
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                <a class="nav-link" th:href="@{/empleados}">
                    <i class="fas fa-id-card me-2"></i>Personal / Empleados
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'DESPACHADOR')">
                <a class="nav-link" th:href="@{/clientes}">
                    <i class="fas fa-users me-2"></i>Choferes / Clientes
                </a>
            </li>
            
            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'DESPACHADOR')">
                <a class="nav-link" th:href="@{/vehiculos}">
                    <i class="fas fa-truck me-2"></i>Vehículos
                </a>
            </li>
            
            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'DESPACHADOR')">
                <a class="nav-link" th:href="@{/cobranzas}">
                    <i class="fas fa-hand-holding-usd me-2"></i>Cobranzas
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'DESPACHADOR')">
                <a class="nav-link" th:href="@{/cobranzas/registrar-pago}">
                    <i class="fas fa-receipt me-2"></i>Registrar Pago
                </a>
            </li>

            <th:block sec:authorize="hasAuthority('ADMIN')">
                <li class="nav-section">CONFIGURACIÓN</li>
                
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}">
                        <i class="fas fa-users-cog me-2"></i>Control de Usuarios
                    </a>
                </li>
            </th:block>

            <li class="nav-item mt-4">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-link text-danger border-0 bg-transparent w-100 text-start">
                        <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                    </button>
                </form>
            </li>
        </ul>
    </nav>

</body>
</html>
